version: "3.9"

services:
  web:
    build:
      context: .
      args:
        REQUIREMENTS_FILE: requirements.prod.txt
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8040:8000"
    env_file:
      - .env.prod
    depends_on:
      - db

  db:
    image: postgres:16
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - .env.prod

volumes:
  db_data:
